ignore:
  - .git
  - __pycache__
  - build
  - build/*
  - cmake-build-*
  - _deps
  - CMakeFiles
  - CMakeCache.txt
syntax_check: {}
language: cmake
test_cmd: cmake -S . -B build -G "MinGW Makefiles" && cmake --build build && ctest --test-dir build --output-on-failure
test_timeout: 120
command_timeout: 120
